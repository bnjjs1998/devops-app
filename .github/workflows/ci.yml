name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Étape 1 : Tests unitaires sur plusieurs versions de Node
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # Correction du chemin ici
          cache-dependency-path: devops-app/package-lock.json
      
      - name: Install dependencies
        run: cd devops-app && npm ci
        
      - name: Run tests
        run: |
          cd devops-app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: devops-app/test-output.txt

  # Étape 2 : Construction de l'image Docker
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          # Correction du contexte ici
          context: ./devops-app
          push: false
          tags: devops-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Étape 3 : Scan de sécurité avec Trivy
  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan application files
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          # Correction du dossier à scanner
          scan-ref: 'devops-app/'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  # Étape 4 : Déploiement (uniquement sur la branche main)
  deploy:
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Déploiement de la version ${{ github.sha }} en cours..."
